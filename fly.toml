# Fly.io configuration — Dene Voice Library
app = "dene-translation-db"
primary_region = "yyz"   # Toronto: keeps data in Canada

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # SQLite lives on a single machine, so keep exactly one always running
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "dene_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
